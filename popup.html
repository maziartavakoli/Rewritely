<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Rewritely</h1>
    <div class="subtitle">AI Writing Assistant</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="prompts">Prompts</button>
    <button class="tab" data-tab="api">API Settings</button>
  </div>

  <!-- Prompts Section -->
  <div class="section active" id="section-prompts">
    <div class="flex-between">
      <label style="margin:0">Your Prompts</label>
      <button class="btn btn-primary btn-sm" id="btn-add-prompt">+ New</button>
    </div>

    <!-- Prompt Editor (hidden by default) -->
    <div class="prompt-editor" id="prompt-editor">
      <label>Title</label>
      <input type="text" id="editor-title" placeholder="e.g. Fix Grammar – Professional">
      <label>System Prompt</label>
      <textarea id="editor-system" placeholder="You are a professional editor..."></textarea>
      <div class="prompt-editor-actions">
        <button class="btn btn-success btn-sm" id="btn-save-prompt">Save</button>
        <button class="btn btn-ghost btn-sm" id="btn-cancel-prompt">Cancel</button>
      </div>
    </div>

    <!-- Prompt List -->
    <div class="prompt-list" id="prompt-list"></div>
  </div>

  <!-- API Settings Section -->
  <div class="section" id="section-api">
    <label>Base URL</label>
    <input type="url" id="api-base-url" placeholder="https://api.openai.com/v1">

    <label>API Key</label>
    <input type="password" id="api-key" placeholder="sk-...">

    <label>Model</label>
    <input type="text" id="api-model" placeholder="gpt-4o-mini">

    <div class="mt-12">
      <button class="btn btn-primary btn-block" id="btn-save-api">Save Settings</button>
    </div>
    <div id="api-status"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Select text in any input field &middot; Click the floating icon to rewrite &middot; Alt+R shortcut
  </div>

  <script src="lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
