<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 340px; padding: 20px; font-family: 'Segoe UI', sans-serif; font-size: 14px; background-color: #fafafa; }
    
    /* Branding Header */
    h3 { margin-top: 0; color: #2c3e50; text-align: center; font-size: 22px; letter-spacing: 1px; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #7f8c8d; font-size: 12px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;}
    
    label { font-weight: 600; display: block; margin-top: 10px; font-size: 12px; color: #34495e; }
    select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px; border: 1px solid #bdc3c7; background: white; }
    
    button { 
      width: 100%; padding: 12px; margin-top: 20px; 
      background-color: #e67e22; /* A nice BegooMagoo Orange */
      color: white; border: none; 
      border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;
      transition: background 0.2s;
    }
    button:hover { background-color: #d35400; }
    button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

    #result { 
      background: white; padding: 15px; margin-top: 20px; 
      border-left: 5px solid #e67e22; border-radius: 4px;
      min-height: 60px; line-height: 1.6; white-space: pre-wrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      color: #2c3e50;
    }
    
    .error { border-left-color: #e74c3c !important; color: #c0392b; background: #fdedec !important; }
  </style>
</head>
<body>
  <h3>BegooMagoo</h3>
  <div class="subtitle">Translate anything, any way you want.</div>
  
  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label for="targetLang">Target Language:</label>
      <select id="targetLang">
        <option value="Persian">Persian (Farsi)</option>
        <option value="English">English</option>
        <option value="German">German</option>
        <option value="French">French</option>
        <option value="Spanish">Spanish</option>
        <option value="Arabic">Arabic</option>
        <option value="Turkish">Turkish</option>
        <option value="Russian">Russian</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
      </select>
    </div>
    <div style="flex: 1;">
      <label for="tone">Tone:</label>
      <select id="tone">
        <option value="Standard">Standard</option>
        <option value="Formal Business">Formal (Work)</option>
        <option value="Friendly and Casual">Friendly</option>
        <option value="Very Simple (ELI5)">Simple</option>
        <option value="Sarcastic and Funny">Sarcastic</option>
        <option value="Poetic">Poetic</option>
        <option value="Angry">Angry</option>
      </select>
    </div>
  </div>

  <button id="translateBtn">Begoo!</button>

  <div id="result">Highlight text on a page and click Begoo!</div>

  <script src="popup.js"></script>
</body>
</html>
